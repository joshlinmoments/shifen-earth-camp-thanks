<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>告白十分地球營</title>
  <meta name="description" content="告白十分地球營工作人員的感謝告白牆 — 讓每一份心意隨天燈升空。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=9" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><radialGradient id='g' cx='0.5' cy='0.52' r='0.62'><stop offset='0' stop-color='%23ffe6a0'/><stop offset='0.6' stop-color='%23ff9a3c'/><stop offset='1' stop-color='%23ff6a2b'/></radialGradient></defs><path d='M20 18 Q32 9 44 18 L39 47 Q32 52 25 47 Z' fill='url(%23g)'/><rect x='24.5' y='45' width='15' height='3' rx='1.5' fill='%23c9531f'/><ellipse cx='32' cy='50' rx='3' ry='4.5' fill='%23ffd24a'/></svg>" />
</head>
<body>
  <!-- 夜空背景：星星 + 漂浮天燈（JS 生成） -->
  <div id="sky" aria-hidden="true"></div>

  <header class="hero">
    <p class="hero__eyebrow">2026 · 告白牆</p>
    <h1 class="hero__title hero__title--img">
      <img src="assets/title-logo.png" alt="告白十分地球營" />
    </h1>
    <p class="hero__subtitle">
      各位夥伴辛苦了！感謝大家的努力！<br />
      在這場十分國小的營隊中，<br />
      我們完成了非常有意義的任務，也創造了許多美麗的回憶！
    </p>
    <p class="hero__subtitle hero__subtitle--call">
      許多匆匆離去來不及說的話，來不及的感謝！<br />
      就在這裡大聲地告白吧！🏮
    </p>
    <nav class="tabs" role="tablist">
      <button class="tab is-active" data-view="wall" role="tab">🏮 告白牆</button>
      <button class="tab" data-view="write" role="tab">✍️ 寫一則告白</button>
    </nav>
  </header>

  <main class="container">
    <!-- ============ 寫感謝 ============ -->
    <section id="view-write" class="view" hidden>
      <form id="thank-form" class="card form" autocomplete="off">
        <h2 class="form__heading">寫一則告白</h2>

        <label class="field">
          <span class="field__label">要告白給誰？ <span class="req">*</span></span>
          <select id="to-select" class="input" required>
            <option value="" disabled selected>— 請選擇對象 —</option>
          </select>
          <span class="field__hint">可以選一個人，也可以選「一整群」或「全體夥伴們」🏮</span>
        </label>

        <label class="field" id="to-custom-field" hidden>
          <span class="field__label">對象姓名</span>
          <input type="text" id="to-custom" class="input" placeholder="輸入對方的名字" maxlength="30" />
        </label>

        <label class="field">
          <span class="field__label">想說的話 <span class="req">*</span></span>
          <textarea id="message" class="input" rows="4" required maxlength="500" placeholder="把來不及說的謝謝，在這裡大聲說出來…"></textarea>
          <span class="counter"><span id="msg-count">0</span>/500</span>
        </label>

        <div class="field field--sender">
          <span class="field__label">你的署名</span>
          <input type="text" id="from" class="input" placeholder="你的名字" maxlength="30" />
          <label class="checkbox">
            <input type="checkbox" id="anon" />
            <span>匿名發送（不顯示我的名字）</span>
          </label>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary">🏮 放上天燈，送出告白</button>
        <p id="form-status" class="form__status" role="status"></p>
      </form>
    </section>

    <!-- ============ 告白牆 ============ -->
    <section id="view-wall" class="view">
      <div class="wall__bar">
        <div class="wall__stat"><span id="count">0</span> 則告白正在天空中飄揚</div>
      </div>

      <div class="wall__search">
        <span class="wall__search-label">🔍 搜尋自己收到誰的告白：</span>
        <div class="wall__search-selects">
          <select id="filter-role" class="input input--sm" aria-label="選擇職務">
            <option value="">全部職務</option>
          </select>
          <span class="wall__search-arrow">›</span>
          <select id="filter-name" class="input input--sm" aria-label="選擇姓名" disabled>
            <option value="">全部</option>
          </select>
          <button type="button" id="filter-reset" class="wall__search-reset" hidden>清除</button>
        </div>
      </div>

      <div id="wall" class="wall"></div>
      <p id="wall-empty" class="wall__empty" hidden>還沒有人放天燈，成為第一個送出告白的人吧 ✨</p>
      <p id="wall-loading" class="wall__empty">✨ 正在點亮天燈…</p>
    </section>
  </main>

  <footer class="footer">
    <p>告白十分地球營 · 告白牆　｜　願每一份心意都隨燈升空</p>
  </footer>

  <!-- Present 模式：單則全螢幕展示（適合截圖分享） -->
  <div id="present" class="present" hidden aria-modal="true" role="dialog">
    <div class="present__sky" aria-hidden="true"></div>

    <header class="present__header">
      <img class="present__logo" src="assets/title-logo.png" alt="告白十分地球營" />
      <span class="present__brand">告白牆</span>
    </header>

    <div class="present__stage">
      <article class="present__card">
        <div class="present__lantern">🏮</div>
        <p class="present__to"><small>致</small> <span id="present-to"></span></p>
        <p class="present__msg" id="present-msg"></p>
        <div class="present__foot">
          <span class="present__from" id="present-from"></span>
          <span class="present__time" id="present-time"></span>
        </div>
      </article>
    </div>

    <div class="present__controls">
      <button type="button" id="present-prev" class="present__btn" aria-label="上一則">‹</button>
      <div class="present__meta">
        <span class="present__counter"><span id="present-index">1</span> / <span id="present-total">1</span></span>
        <button type="button" id="present-close" class="present__close" aria-label="關閉">✕ 關閉</button>
      </div>
      <button type="button" id="present-next" class="present__btn" aria-label="下一則">›</button>
    </div>
  </div>

  <script type="module" src="app.js?v=9"></script>
</body>
</html>
